---
site: !include site.yaml
# bootstrap and system packages built/installed when "make bootstrap" is invoked
# All of these should be lists, see the "build:" example for yaml2rpm below

# BOOTSTRAP
# Pre-reqs for building all packages. These packages are built, in order, and installed as they are built. 
bootstrap:

# SYSTEM
# Packages supplied by the OS vendor that must be installed prior to building anything in this admix
#enablerepo: epel
system:
   - !ifeq "{{site.os_release}},7,python-devel,"
   - !ifeq "{{site.os_release}},8,platform-python-devel,"
   - !ifeq "{{site.os_release}},9,platform-python-devel,"
   - !ifeq "{{site.os_release}},10,python3-devel,"

   
# BUILD
# Packages that must be built in this admix
build0:
   - yaml2rpm
   - rcic-module-support
   - rcic-module-path
build:
   - "{{build0}}" 
   - rcic-dev-repo


# MANIFEST
# List of packages that would probably be installed on a generic target system
# This says the manifest is  the {{build0}}. All built and all system packages is 
# another rational configuration
# There are special names of python support packages, dependent upon os release
manifest:  
   - "{{build0}}"
   - environment-modules
   - !eval "'bin-python' if int({{site.os_release}}) < 10 else ''"
   - !eval "'python-future' if int({{site.os_release}}) < 10 else ''"
   - !ifeq "{{site.os_release}},7,python-setuptools,"
   - !ifeq "{{site.os_release}},8,platform-python-setuptools,"
   - !ifeq "{{site.os_release}},9,platform-python-setuptools,"
   - !ifeq "{{site.os_release}},10,python3-setuptools,"
   - python-ruamel-yaml
   - python-ruamel-yaml-clib
 

